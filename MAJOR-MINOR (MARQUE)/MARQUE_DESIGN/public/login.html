<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MARQUE DESIGN - Sign In</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/navbar.css">  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #0a0f1f 0%, #111a2e 100%);
    }
    
    .auth-card {
      background: rgba(17,26,46,.55);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: saturate(140%) blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      width: 100%;
      max-width: 400px;
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .auth-header h1 {
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }
    
    .auth-header p {
      color: var(--muted);
      margin: 0;
    }
    
    .auth-tabs {
      display: flex;
      margin-bottom: 2rem;
      background: rgba(0,0,0,.2);
      border-radius: 8px;
      padding: 4px;
    }
    
    .auth-tab {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    .auth-tab.active {
      background: var(--accent);
      color: #000;
    }
    
    .auth-form {
      display: none;
    }
    
    .auth-form.active {
      display: block;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    
    .field {
      margin-bottom: 1rem;
    }
    
    .field label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text);
      font-weight: 500;
    }
    
    .field input {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }
    
    .btn:hover {
      background: #c19b2e;
      transform: translateY(-1px);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .divider {
      text-align: center;
      margin: 1.5rem 0;
      position: relative;
      color: var(--muted);
    }
    
    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,.1);
    }
    
    .divider span {
      background: rgba(17,26,46,.55);
      padding: 0 1rem;
    }
    
    .oauth-btn {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,.1);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .oauth-btn:hover {
      background: rgba(255,255,255,.2);
      transform: translateY(-1px);
    }
    
    .success-message, .error-message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }
    
    .success-message {
      background: rgba(0, 184, 148, 0.2);
      color: #00b894;
      border: 1px solid #00b894;
    }
    
    .error-message {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
      border: 1px solid #ff6b6b;
    }
    
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top: 2px solid currentColor;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .forgot-password {
      text-align: center;
      margin-top: 1rem;
    }
    
    .forgot-password a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }
    
    .forgot-password a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>MARQUE <span style="color: var(--text);">DESIGN</span></h1>
        <p>Welcome to luxury car customization</p>
      </div>
      
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="register">Create Account</button>
      </div>
      
      <!-- Success/Error Messages -->
      <div class="success-message" id="success-message"></div>
      <div class="error-message" id="error-message"></div>
      
      <!-- Login Form -->
      <form id="login-form" class="auth-form active">
        <div class="field">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" required>
        </div>
        
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required>
        </div>
        
        <button type="submit" class="btn" id="login-btn">
          <span class="btn-text">Sign In</span>
          <span class="loading" style="display: none;"></span>
        </button>
        
        <div class="forgot-password">
          <a href="#" onclick="alert('Password reset feature coming soon!')">Forgot your password?</a>
        </div>
      </form>
      
      <!-- Register Form -->
      <form id="register-form" class="auth-form">
        <div class="form-row">
          <div class="field">
            <label for="register-firstName">First Name</label>
            <input type="text" id="register-firstName" required>
          </div>
          <div class="field">
            <label for="register-lastName">Last Name</label>
            <input type="text" id="register-lastName" required>
          </div>
        </div>
        
        <div class="field">
          <label for="register-email">Email Address</label>
          <input type="email" id="register-email" required>
        </div>
        
        <div class="field">
          <label for="register-phone">Phone Number (Optional)</label>
          <input type="tel" id="register-phone" placeholder="+91 6353808435">
        </div>
        
        <div class="field">
          <label for="register-password">Password (minimum 6 characters)</label>
          <input type="password" id="register-password" required minlength="6">
        </div>
        
        <div class="field">
          <label for="register-confirmPassword">Confirm Password</label>
          <input type="password" id="register-confirmPassword" required minlength="6">
        </div>
        
        <button type="submit" class="btn" id="register-btn">
          <span class="btn-text">Create Account</span>
          <span class="loading" style="display: none;"></span>
        </button>
      </form>
      
      <!-- OAuth Section -->
      <div class="divider">
        <span>or continue with</span>
      </div>
      
      <button class="oauth-btn" id="google-signin-btn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      
      <button class="oauth-btn" onclick="alert('Apple Sign In coming soon!')">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Continue with Apple
      </button>
    </div>
  </div>

  <script src="/js/navbar.js"></script>  <script src="/js/auth.js"></script>
</body>
</html>
